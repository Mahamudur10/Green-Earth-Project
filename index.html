<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Earth-project</title>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main class="container mx-auto">
        <h2 class="text-[#4ade80] font-bold text-4xl text-center">Choose Your Trees</h2>
        <div class="grid grid-cols-12 gap-8">
            <!-- catagories -->
            <div class="bg-white card card-body shadow-2xl rounded-xl col-span-3">
                <h2 class="font-bold text-2xl text-center">Categories</h2>
                <div>
                    <button class="btn btn-success w-full mb-4" id="allTreesbtn">All Trees</button>
                    <!-- Categories Container -->
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- Categories will be dynamically loaded here by js -->
                    </div>
                </div>
            </div>
            <!-- Trees -->
            <div class="bg-white card card-body shadow-2xl rounded-xl col-span-6">
                <!-- Trees will rendered -->
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <!-- dynamecally added here -->

                </div>
                <!-- loading spinner -->
                <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
                    <span class="loading loading-dots loading-xl"></span>
                </div>
            </div>


            <!-- cart -->
            <div class="bg-white card card-body shadow-2xl rounded-xl col-span-3">
                Cart
            </div>
        </div>
    </main>

    <!-- js -->
    <script src="script.js"></script>
</body>

</html>
